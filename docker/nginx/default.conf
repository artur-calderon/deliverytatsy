server {
    listen 80;
    server_name lanchonete.freddns.org;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    # Traefik envia X-Forwarded-*; Laravel/TastyIgniter usa para gerar URLs HTTPS
    real_ip_header X-Forwarded-For;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~ ^/favicon\.ico {
        try_files $uri /index.php;
    }

    location ~ ^/sitemap\.xml {
        try_files $uri /index.php;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ ^/storage/media/.*\.(php|php\d*|phtml|phar|cgi|pl|py|asp|aspx|sh)$ {
        deny all;
    }

    location ~ ^/storage/media/.*/\. {
        deny all;
    }

    location ^~ /storage/media/uploads/ {
        autoindex off;
        try_files $uri =404;
    }

    location ^~ /storage/media/attachments/ {
        autoindex off;
        try_files $uri =404;
    }

    location ^~ /storage/media/ {
        autoindex off;
        try_files $uri =404;
    }

    location ~ ^/media {
        try_files $uri =404;
    }

    location ~ ^/themes/.*/assets {
        try_files $uri =404;
    }

    location ~ /\.ht {
        deny all;
    }
}
